name: Interface Config IOS
ned_id: cisco-ios-cli-1.0
description: Configure a Cisco IOS interface

variables:
  INTERFACE:
    label: Interface
    type: string
    required: true
    default: GigabitEthernet0/0
  DESCRIPTION:
    label: Description
    type: string
    default: ""
  IP_ADDRESS:
    label: IP Address
    type: string
    required: true
  SUBNET_MASK:
    label: Subnet Mask
    type: string
    default: 255.255.255.0
  SHUTDOWN:
    label: Shutdown
    type: string
    default: no shutdown

template: |
  interface {{ INTERFACE }}
   description {{ DESCRIPTION }}
   ip address {{ IP_ADDRESS }} {{ SUBNET_MASK }}
   {{ SHUTDOWN }}
